apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xsimpleapps.example.com
spec:
  compositeTypeRef:
    apiVersion: example.com/v1alpha1
    kind: XSimpleApp
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: crossplane-contrib-function-patch-and-transform
      input:
        apiVersion: pt.crossplane.io/v1beta1
        kind: Resources
        resources:
            - name: namespace
              base:
                apiVersion: kubernetes.crossplane.io/v1alpha2
                kind: Object
                spec:
                  deletionPolicy: Delete
                  forProvider:
                    manifest:
                      apiVersion: v1
                      kind: Namespace
                      metadata:
                        name: ""
                  providerConfigRef:
                    name: kubernetes-provider
              patches:
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.namespace
                  toFieldPath: spec.forProvider.manifest.metadata.name
            - name: deployment
              base:
                apiVersion: kubernetes.crossplane.io/v1alpha2
                kind: Object
                spec:
                  deletionPolicy: Delete
                  forProvider:
                    manifest:
                      apiVersion: apps/v1
                      kind: Deployment
                      spec:
                        replicas: 1
                        selector:
                          matchLabels:
                            app: ""
                        template:
                          metadata:
                            labels:
                              app: ""
                          spec:
                            containers:
                              - name: app
                                image: ""
                                ports:
                                  - containerPort: 80
                  providerConfigRef:
                    name: kubernetes-provider
              patches:
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.replicas
                  toFieldPath: spec.forProvider.manifest.spec.replicas
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.image
                  toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].image
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.namespace
                  toFieldPath: spec.forProvider.manifest.metadata.namespace
                - type: FromCompositeFieldPath
                  fromFieldPath: metadata.name
                  toFieldPath: spec.forProvider.manifest.spec.selector.matchLabels.app
                - type: FromCompositeFieldPath
                  fromFieldPath: metadata.name
                  toFieldPath: spec.forProvider.manifest.spec.template.metadata.labels.app
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.port
                  toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].ports[0].containerPort
            - name: service
              base:
                apiVersion: kubernetes.crossplane.io/v1alpha2
                kind: Object
                spec:
                  deletionPolicy: Delete
                  forProvider:
                    manifest:
                      apiVersion: v1
                      kind: Service
                      spec:
                        ports:
                          - port: 80
                            targetPort: 80
                            protocol: TCP
                        selector:
                          app: ""
                  providerConfigRef:
                    name: kubernetes-provider
              patches:
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.port
                  toFieldPath: spec.forProvider.manifest.spec.ports[0].port
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.port
                  toFieldPath: spec.forProvider.manifest.spec.ports[0].targetPort
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.namespace
                  toFieldPath: spec.forProvider.manifest.metadata.namespace
                - type: FromCompositeFieldPath
                  fromFieldPath: metadata.name
                  toFieldPath: spec.forProvider.manifest.spec.selector.app
